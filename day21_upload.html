<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BIO 304 - Day 21 Upload</title><style>
@import url('https://cdn.jsdelivr.net/npm/@fontsource-variable/plus-jakarta-sans/index.css');
:root{--navy:#0B1530;--terra:#8B3A2E;--terra-soft:#A0452F;--gold:#C9A14A;--gold-deep:#9c7a2f;
 --cream:#F5F1E8;--muted:#5b6275;--line:#e4ddcd}
*{box-sizing:border-box}
body{margin:0;background:transparent;
 font-family:'Plus Jakarta Sans Variable','Plus Jakarta Sans',system-ui,sans-serif;
 -webkit-font-smoothing:antialiased;color:var(--navy);padding:14px}
.card{max-width:560px;margin:0 auto;background:#fff;border:1px solid #d4d2d9;border-radius:14px;
 box-shadow:0 4px 18px -7px rgba(11,21,48,.28);overflow:hidden}
.head{background:var(--navy);color:#fff;padding:13px 20px;display:flex;justify-content:space-between;
 align-items:baseline;gap:10px;position:relative}
.head::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;
 background:linear-gradient(90deg,var(--terra) 0 33%,var(--gold) 33% 66%,var(--cream) 66% 100%)}
.dn{font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
.dd{font-size:13px;font-weight:600;color:#c5cbdb}
.body{padding:16px 20px 18px}
.lbl{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
 color:var(--terra-soft);margin:0 0 9px;display:flex;align-items:center;gap:8px}
.dbl{font-size:9px;font-weight:800;letter-spacing:.05em;color:var(--gold-deep);
 background:rgba(201,161,74,.16);border:1px solid rgba(201,161,74,.45);padding:1px 7px;border-radius:999px}
.wb{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--navy);
 font-weight:700;font-size:16px;line-height:1.3;padding:3px 0;transition:color .15s}
.wb+.wb{margin-top:3px}
.wb:hover{color:var(--terra)}
.wb-dot{flex:none;width:8px;height:8px;border-radius:2px;background:var(--terra);transform:rotate(45deg)}
.due{margin-top:15px;background:var(--cream);border:1px solid var(--line);border-radius:11px;
 padding:11px 15px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.due-l{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.due-d{font-size:15px;font-weight:800;color:var(--navy)}
.due-t{font-size:12px;font-weight:700;background:var(--gold);color:var(--navy);padding:3px 11px;border-radius:999px;white-space:nowrap}
.note{margin:11px 2px 0;font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.45}
.note code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;background:var(--cream);
 border:1px solid var(--line);padding:1px 5px;border-radius:5px;color:var(--terra-soft)}
@media(max-width:480px){.head{flex-direction:column;gap:2px}.due{flex-wrap:wrap;gap:6px}}
</style></head>
<body>
  <div class="card">
    <div class="head"><span class="dn">Day 21 &middot; Week 6</span><span class="dd">Monday, July 13</span></div>
    <div class="body">
      <p class="lbl">Upload these workbooks<span class="dbl">2 workbooks</span></p>
      <a class="wb" href="https://drsrennie-stack.github.io/nonmajors/workbook_day21_blood-composition-and-hemopoiesis.html" target="_blank" rel="noopener"><span class="wb-dot"></span>Blood Composition and Hemopoiesis</a><a class="wb" href="https://drsrennie-stack.github.io/nonmajors/workbook_day21_hemostasis-and-blood-typing.html" target="_blank" rel="noopener"><span class="wb-dot"></span>Hemostasis and Blood Typing</a>
      <div class="due"><span class="due-l">Due</span><span class="due-d">Tue, Jul 14</span><span class="due-t">11:59 PM</span></div>
      <p class="note">Submit each as a separate scanned PDF: <code>LastName_Day21_Blood-Composition-and-Hemopoiesis.pdf</code> and <code>LastName_Day21_Hemostasis-and-Blood-Typing.pdf</code></p>
    </div>
  </div>
</body></html>
